<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生打卡 & 數位聯絡簿</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --border-color: #e1e8ed;
            --status-present: #2ecc71; /* 已到 綠色 */
            --status-late: #ff6b6b;    /* 遲到 紅色 (調柔和一點配合截圖) */
            --status-absent: #bdc3c7;  /* 未到 灰色 */
            --status-excused: #9b59b6; /* 請假 紫色 */
            --status-club: #3498db;    /* 社團 藍色 */
            --text-color: #555;
            --title-color: #333;
        }

        * { margin: 0; padding: 0; box-shadow: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; }

        /* Header 導覽列 */
        header { background-color: var(--card-bg); padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .title-area { display: flex; align-items: center; font-size: 20px; font-weight: bold; color: var(--title-color); }
        .title-area span.icon { color: #f39c12; margin-right: 10px; font-size: 24px; }
        
        .nav-buttons { display: flex; gap: 5px; background-color: #f8f9fa; padding: 5px; border-radius: 12px; border: 1px solid #eee; }
        .nav-btn { background: none; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; color: var(--text-color); transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-btn:hover { background-color: #e9ecef; }
        .nav-btn.active { background-color: var(--card-bg); color: var(--status-late); font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        .action-buttons { display: flex; gap: 10px; align-items: center; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-color); display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; transition: background-color 0.2s; }
        .action-btn:hover { background-color: #e9ecef; }
        .settings-btn { background-color: #f1f3f5; }

        /* Main Container */
        main { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }

        /* Digital Clock 時鐘 */
        .clock-section { margin-bottom: 20px; text-align: center; }
        .digital-clock { background-color: #212529; color: #ffff00; font-family: 'Courier New', Courier, monospace; font-size: 45px; font-weight: bold; padding: 10px 30px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); letter-spacing: 2px; display: inline-block; }

        /* Summary Section 統計區 */
        .summary-section { width: 100%; max-width: 900px; display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .summary-badge { padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; gap: 8px; background-color: #fff; border: 1px solid #eee; }
        .summary-badge span { margin-left: 2px; }

        .badge-total   { color: #4a90e2; border-color: #d0e3f7; background-color: #f0f7ff; }
        .badge-present { color: var(--status-present); border-color: #c3f0d5; background-color: #ebfbf0; }
        .badge-late    { color: var(--status-late); border-color: #ffcccc; background-color: #fff0f0; }
        .badge-absent  { color: #e6a23c; border-color: #fce8cc; background-color: #fdf6ec; }
        .badge-excused { color: var(--status-excused); border-color: #e5ccff; background-color: #f7f0ff; }
        .badge-club    { color: var(--status-club); border-color: #cce5ff; background-color: #f0f7ff; }

        /* Student Grid 學生卡片網格 */
        .grid-section { width: 100%; max-width: 1050px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; justify-items: center; }
        .student-card { width: 100%; aspect-ratio: 2 / 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; border: 2px solid var(--border-color); background-color: #fff; }
        .student-card:active { transform: scale(0.95); }
        
        .student-no { font-size: 26px; font-weight: bold; margin-bottom: 2px; color: inherit; }
        .student-status-text { font-size: 13px; font-weight: bold; color: inherit; }

        /* 卡片狀態顏色 (邊框、文字與微底色) */
        .student-card.is-absent { border-color: #e4e7ed; color: #a8abb2; }
        .student-card.is-present { border-color: #95d475; color: #67c23a; background-color: #f0f9eb; }
        .student-card.is-late    { border-color: #f89898; color: #f56c6c; background-color: #fef0f0; }
        .student-card.is-excused { border-color: #d4b3ff; color: #b388ff; background-color: #faf5ff; }
        .student-card.is-club    { border-color: #a0cfff; color: #409eff; background-color: #ecf5ff; }

        /* Contact Book Popup 聯絡簿彈窗 */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
        .popup-content { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; color: var(--primary-color); }
        .close-popup { font-size: 26px; cursor: pointer; color: #999; line-height: 1; }
        .close-popup:hover { color: #333; }
        textarea.contact-input { width: 100%; height: 120px; padding: 12px; border: 1px solid #dcdfe6; border-radius: 8px; font-size: 15px; resize: none; margin-bottom: 15px; outline: none; transition: border-color 0.2s; }
        textarea.contact-input:focus { border-color: var(--status-club); }
        .popup-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .popup-btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; transition: opacity 0.2s; }
        .popup-btn:hover { opacity: 0.8; }
        .save-btn { background-color: var(--status-club); color: white; }
        .cancel-btn { background-color: #f4f4f5; color: #909399; }

    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <span class="icon">⭐</span>學生打卡 & 數位聯絡簿<span class="icon">⭐</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn"><span class="icon">💻</span>分屏顯示</button>
            <button class="nav-btn active"><span class="icon">🖥️</span>打卡區</button>
            <button class="nav-btn"><span class="icon">↗️</span>聯絡簿</button>
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="resetBtn"><span class="icon">🔄</span>重置</button>
            <button class="action-btn"><span class="icon">📄</span>CSV報表</button>
            <button class="action-btn" id="exportBtn"><span class="icon">📤</span>匯出</button>
            <button class="action-btn"><span class="icon">📥</span>匯入</button>
            <button class="action-btn settings-btn"><span class="icon">⚙️</span>設定</button>
        </div>
    </header>

    <main>
        <div class="clock-section">
            <div class="digital-clock" id="digitalClock">--:--:--</div>
        </div>

        <div class="summary-section">
            <div class="summary-badge badge-total">應到: <span id="totalCount">30</span></div>
            <div class="summary-badge badge-present">已到: <span id="presentCount">0</span></div>
            <div class="summary-badge badge-late">遲到: <span id="lateCount">0</span></div>
            <div class="summary-badge badge-absent">未到: <span id="absentCount">30</span></div>
            <div class="summary-badge badge-excused">請假: <span id="excusedCount">0</span></div>
            <div class="summary-badge badge-club">社團: <span id="clubCount">0</span></div>
        </div>

        <div class="grid-section" id="studentGrid">
            </div>
    </main>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <div class="popup-header">
                <div id="popupTitle">聯絡簿 - 1號</div>
                <span class="close-popup" id="closePopup">&times;</span>
            </div>
            <textarea class="contact-input" id="contactInput" placeholder="請輸入需要交接或紀錄的事項..."></textarea>
            <div class="popup-actions">
                <button class="popup-btn cancel-btn" id="cancelPopup">取消</button>
                <button class="popup-btn save-btn" id="savePopup">儲存紀錄</button>
            </div>
        </div>
    </div>

    <script>
        const defaultStudentCount = 30; // 學生總數
        let studentsData = [];
        let currentEditingStudent = -1; 

        // DOM 元素綁定
        const clockEl = document.getElementById('digitalClock');
        const gridEl = document.getElementById('studentGrid');
        const counts = {
            total: document.getElementById('totalCount'),
            present: document.getElementById('presentCount'),
            late: document.getElementById('lateCount'),
            absent: document.getElementById('absentCount'),
            excused: document.getElementById('excusedCount'),
            club: document.getElementById('clubCount')
        };
        const resetBtn = document.getElementById('resetBtn');
        const exportBtn = document.getElementById('exportBtn');
        const navBtns = document.querySelectorAll('.nav-btn');

        // 彈窗 DOM
        const popupOverlay = document.getElementById('popupOverlay');
        const popupTitle = document.getElementById('popupTitle');
        const contactInput = document.getElementById('contactInput');
        const closePopup = document.getElementById('closePopup');
        const cancelPopup = document.getElementById('cancelPopup');
        const savePopup = document.getElementById('savePopup');

        // 初始化執行
        window.onload = function() {
            loadStudentsData();
            startClock();
            renderGrid();
            updateSummary();
            setupResetButton();
            setupExportButton();
            setupNavButtons();
            setupPopupButtons();
        };

        // --- 數位時鐘 ---
        function startClock() {
            function update() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                clockEl.innerText = `${h}:${m}:${s}`;
            }
            update();
            setInterval(update, 1000);
        }

        // --- 將時間物件轉為 HH:MM 格式 ---
        function formatTime(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }

        // --- 數據載入與儲存 ---
        function loadStudentsData() {
            const storedData = localStorage.getItem('classManageStudentsDataV2'); // 換新 key 避免舊資料衝突
            if (storedData) {
                studentsData = JSON.parse(storedData);
            } else {
                for (let i = 1; i <= defaultStudentCount; i++) {
                    studentsData.push({
                        no: i,
                        status: 'absent', // 預設未到
                        punchTime: null,
                        contactLog: ''
                    });
                }
                saveStudentsData();
            }
        }

        function saveStudentsData() {
            localStorage.setItem('classManageStudentsDataV2', JSON.stringify(studentsData));
        }

        // --- 網格渲染 (關鍵更新：時間顯示) ---
        function renderGrid() {
            gridEl.innerHTML = ''; 
            const activeNav = document.querySelector('.nav-btn.active').innerText.trim();
            const isContactMode = activeNav.includes('聯絡簿');

            studentsData.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = `student-card is-${student.status}`;
                card.dataset.index = index;

                // 決定卡片下方要顯示什麼文字
                let displayText = '';
                if (isContactMode) {
                    displayText = student.contactLog ? '📝有紀錄' : '點擊紀錄';
                } else {
                    // 打卡模式下
                    if (student.status === 'present' || student.status === 'late') {
                        displayText = formatTime(student.punchTime); // 顯示 HH:MM
                    } else if (student.status === 'absent') {
                        displayText = '未到';
                    } else if (student.status === 'excused') {
                        displayText = '請假';
                    } else if (student.status === 'club') {
                        displayText = '社團';
                    }
                }

                card.innerHTML = `
                    <div class="student-no">${student.no}</div>
                    <div class="student-status-text">${displayText}</div>
                `;
                card.onclick = handleCardClick;
                gridEl.appendChild(card);
            });
        }

        // --- 卡片點擊處理 ---
        function handleCardClick() {
            const index = this.dataset.index;
            const student = studentsData[index];
            const activeNav = document.querySelector('.nav-btn.active').innerText.trim();

            if (activeNav.includes('打卡區')) {
                // 狀態循環：未到 -> 已到 -> 遲到 -> 請假 -> 社團 -> 循環
                const statusOrder = ['absent', 'present', 'late', 'excused', 'club'];
                let currentIndex = statusOrder.indexOf(student.status);
                let nextStatus = statusOrder[(currentIndex + 1) % statusOrder.length];

                student.status = nextStatus;
                
                // 如果切換到「已到」或「遲到」，記錄當下時間
                if (nextStatus === 'present' || nextStatus === 'late') {
                    student.punchTime = new Date().toISOString(); // 記錄標準時間格式
                } else {
                    student.punchTime = null; // 其他狀態清除時間
                }

                saveStudentsData();
                renderGrid();
                updateSummary();
            } else if (activeNav.includes('聯絡簿')) {
                openContactPopup(index);
            }
        }

        // --- 彈窗處理 ---
        function openContactPopup(index) {
            currentEditingStudent = index;
            const student = studentsData[index];
            popupTitle.innerText = `聯絡簿 - ${student.no}號`;
            contactInput.value = student.contactLog || '';
            popupOverlay.style.display = 'flex';
            setTimeout(() => contactInput.focus(), 100);
        }

        function closeContactPopup() {
            popupOverlay.style.display = 'none';
            currentEditingStudent = -1;
        }

        function setupPopupButtons() {
            closePopup.onclick = closeContactPopup;
            cancelPopup.onclick = closeContactPopup;
            savePopup.onclick = function() {
                if (currentEditingStudent !== -1) {
                    studentsData[currentEditingStudent].contactLog = contactInput.value.trim();
                    saveStudentsData();
                    closeContactPopup();
                    renderGrid(); // 重新渲染以更新卡片上的「📝有紀錄」提示
                }
            };
        }

        // --- 更新上方統計數字 ---
        function updateSummary() {
            const summary = { total: studentsData.length, present: 0, late: 0, absent: 0, excused: 0, club: 0 };
            studentsData.forEach(student => {
                if (summary[student.status] !== undefined) summary[student.status]++;
            });

            counts.total.innerText = summary.total;
            counts.present.innerText = summary.present;
            counts.late.innerText = summary.late;
            counts.absent.innerText = summary.absent;
            counts.excused.innerText = summary.excused;
            counts.club.innerText = summary.club;
        }

        // --- 重置與匯出 ---
        function setupResetButton() {
            resetBtn.onclick = function() {
                if (confirm('確定要重置今日所有打卡狀態嗎？（聯絡簿紀錄不會被清除）')) {
                    studentsData.forEach(student => {
                        student.status = 'absent';
                        student.punchTime = null;
                    });
                    saveStudentsData();
                    renderGrid();
                    updateSummary();
                }
            };
        }

        function setupExportButton() {
            exportBtn.onclick = function() {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF座號,狀態,打卡時間,聯絡簿紀錄\n"; // 加入 BOM 避免 Excel 亂碼
                studentsData.forEach(s => {
                    let timeStr = s.punchTime ? formatTime(s.punchTime) : '--';
                    let statusName = { 'absent':'未到', 'present':'已到', 'late':'遲到', 'excused':'請假', 'club':'社團' }[s.status];
                    let logEntry = `"${(s.contactLog || '').replace(/"/g, '""')}"`;
                    csvContent += `${s.no},${statusName},${timeStr},${logEntry}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `打卡報表_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        // --- 導覽列切換 ---
        function setupNavButtons() {
            navBtns.forEach(btn => {
                btn.onclick = function() {
                    navBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderGrid(); // 根據模式重新繪製卡片內容
                }
            });
        }
    </script>
</body>
</html>
